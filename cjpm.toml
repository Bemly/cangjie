[package]
cjc-version = "1.1.0"
name = "spireBlog"
description = "一只蓝莓小果冻 - Blueberry Jelly"
version = "2.0.0"
target-dir = ""
src-dir = ""
output-type = "executable"
compile-option = ""
override-compile-option = ""
link-option = ""
package-configuration = {}

[dependencies]
soulsoft_web_http = "1.0.20260401"
soulsoft_web_routing = "1.0.20260401"
soulsoft_web_hosting = "1.0.20260401"
soulsoft_extensions_injection = "1.0.20260401"

[target]
[target.x86_64-unknown-linux-gnu]
compile-option = "-Woff unused --diagnostic-format=noColor -Woff deprecated -ldl -lcangjie-dynamicLoader-opensslFFI"
[target.x86_64-unknown-linux-gnu.bin-dependencies]
path-option = [ "${CANGJIE_STDX_PATH}" ]
