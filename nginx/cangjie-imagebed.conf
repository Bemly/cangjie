# Cangjie 图床 nginx 配置
# 部署位置: /usr/trim/nginx/conf/conf.d/cangjie.conf
#
# 需要在 nginx.conf 的 http {} 块中添加:
#   limit_req_zone $binary_remote_addr zone=cangjie_limit:10m rate=10r/s;
#   limit_conn_zone $binary_remote_addr zone=cangjie_conn:10m;
#   limit_req_status 429;
#   limit_conn_status 429;

location ^~ /cangjie/ {
    alias /vol1/1000/仓颉网站开发/cangjie-images/;

    # 频率限制
    limit_req zone=cangjie_limit burst=20 nodelay;
    limit_conn cangjie_conn 10;

    # CORS 配置（具体 origin + credentials）
    add_header 'Access-Control-Allow-Origin' 'https://bemly.top' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

    # 缓存头
    add_header 'Cache-Control' 'public, max-age=31536000';

    # 设置 SameSite cookie（带 Partitioned 属性，1天过期）
    add_header 'Set-Cookie' 'mode=relay; Path=/; HttpOnly; SameSite=None; Secure; Partitioned; Max-Age=86400' always;

    # 禁止目录列表
    autoindex off;
}
